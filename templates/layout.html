{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="icon" href="{{asset "/static/favicon.svg"}}" type="image/svg+xml">
    <script src="{{asset "/static/theme.js"}}"></script>
    <link rel="stylesheet" href="{{asset "/static/style.css"}}">
    <script src="{{asset "/static/htmx.min.js"}}"></script>
</head>
<body{{if .BodyClass}} class="{{.BodyClass}}"{{end}}>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="nav-brand">𝕂</a>
            <div class="nav-links">
                {{if .CurrentUser}}
                    <a href="/compose" class="nav-link nav-icon-link" title="New Post" aria-label="New Post">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                    </a>
                    <a href="/bookmarks" class="nav-link" title="Bookmarks">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                    </a>
                    <a href="/docs" class="nav-link" title="Docs" aria-label="Docs">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9.25 9a2.75 2.75 0 1 1 4.62 2c-.58.55-1.12.93-1.37 1.75"/><path d="M12 17h.01"/></svg>
                    </a>
                    <button type="button" class="nav-link nav-icon-link nav-icon-btn" data-theme-toggle title="Theme: System" aria-label="Theme: System">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8"/><path d="M12 16v4"/></svg>
                    </button>
                    <a href="/user/{{.CurrentUser.Username}}" class="nav-user">
                        <img src="{{.CurrentUser.AvatarURL}}" alt="" class="avatar-sm">
                        {{.CurrentUser.Username}}
                    </a>
                {{else}}
                    <a href="/docs" class="nav-link" title="Docs" aria-label="Docs">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9.25 9a2.75 2.75 0 1 1 4.62 2c-.58.55-1.12.93-1.37 1.75"/><path d="M12 17h.01"/></svg>
                    </a>
                    <button type="button" class="nav-link nav-icon-link nav-icon-btn" data-theme-toggle title="Theme: System" aria-label="Theme: System">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8"/><path d="M12 16v4"/></svg>
                    </button>
                    <a href="/login" class="btn btn-primary btn-sm">Sign In with GitHub</a>
                {{end}}
            </div>
        </div>
    </nav>

    <main class="container">
        {{template "content" .}}
    </main>

    <footer class="footer">
        <div class="container">
            <p>KarpathyTalk - a positive developer community for builders and agents.</p>
        </div>
    </footer>

    <script src="{{asset "/static/editor.js"}}"></script>
</body>
</html>
{{end}}
