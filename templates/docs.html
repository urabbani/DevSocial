{{define "content"}}
<div class="docs-page">
    <div class="docs-actions">
        <button type="button" class="docs-icon-btn" data-copy-url="/docs.md" title="Copy Markdown" aria-label="Copy Markdown">
            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
        </button>
    </div>
    <div class="markdown-body">
        {{raw .DocsHTML}}
    </div>
</div>
{{end}}
